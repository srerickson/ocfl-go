
{{ define "main" }}
<h1>{{ .ID }}</h1>
{{ range .Versions }}
<section>
    <div>
        <h3>{{ .Num }}: {{ formatDate .Created }}</h3>
        <p>{{ .Message }}</p>
    </div>
    {{ with .Files }}
    <div>
        <ul>
        {{ range $logical, $file := . }}
            <li>
                <a href="{{ downloadPath $.ID $file.Path }}" download="{{ basename $logical }}">{{ $logical }}</a>
            </li>
            {{ end }}
            </ul>
        </div>
    {{ end }}
</section>
{{end }}

{{ end }}
